name: Commodity Options Screener

on:
  schedule:
    - cron: '0 6 * * *'      # Täglich um 6:00 UTC (8:00 CEST)
  workflow_dispatch:         # Manuell auslösbar

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Commodity Options Screener
        run: python src/main.py

      - name: Commit updated files (COT history + positions)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add data/*.json
          git commit -m "Update COT history and positions [skip ci]" || exit 0
          git push
