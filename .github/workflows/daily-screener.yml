name: Commodity Options Screener

on:
  schedule:
    - cron: '0 6 * * *'      # täglich um 6 Uhr UTC
  workflow_dispatch:         # manuell auslösbar

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Screener
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          EIA_KEY: ${{ secrets.EIA_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          FRED_KEY: ${{ secrets.FRED_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TRADIER_KEY: ${{ secrets.TRADIER_KEY }}
        run: python src/main.py

      - name: Commit persistent files (force-add last_run.json)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f data/last_run.json data/*.json
          git commit -m "Update last_run.json and positions [skip ci]" || echo "Nothing to commit"
          git push
