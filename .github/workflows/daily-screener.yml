name: Commodity Options Screener

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest

    # ←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←
    # Hier werden deine exakten Secret-Namen übergeben
    env:
      TRADIER_KEY: ${{ secrets.TRADIER_KEY }}
      FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      EIA_KEY: ${{ secrets.EIA_KEY }}
      FRED_KEY: ${{ secrets.FRED_KEY }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Commodity Options Screener
        run: python src/main.py

      - name: Commit updated files (COT history + positions)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add data/*.json
          git commit -m "Update COT history and positions [skip ci]" || exit 0
          git push
